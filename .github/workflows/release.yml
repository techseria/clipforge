name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    with:
      # CI runs full test suite on the tag before publishing
      # (this is a "reusable workflow" pattern)
      # (in this minimal setup, CI is run separately on main before tagging)
    secrets: inherit

  publish-images:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/techseria/clipforge-${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/techseria/clipforge-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  github-release:
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "ClipForge v${{ steps.version.outputs.VERSION }}"
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## ClipForge v${{ steps.version.outputs.VERSION }}

            📦 **Docker images:**
            ```
            docker pull ghcr.io/techseria/clipforge-api:${{ steps.version.outputs.VERSION }}
            docker pull ghcr.io/techseria/clipforge-worker:${{ steps.version.outputs.VERSION }}
            docker pull ghcr.io/techseria/clipforge-web:${{ steps.version.outputs.VERSION }}
            ```

            📝 **Full changelog:** https://github.com/techseria/clipforge/blob/main/CHANGELOG.md
            📚 **Docs:** https://github.com/techseria/clipforge/blob/main/docs/
            🔒 **Security:** https://github.com/techseria/clipforge/security

            See [RELEASING.md](https://github.com/techseria/clipforge/blob/main/docs/RELEASING.md) for upgrade notes.
