server {
  listen 5173;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA history fallback
  location / {
    try_files $uri /index.html;
  }

  # Cache static assets
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}